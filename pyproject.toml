[tool.poetry]
name = "bias-scope"
version = "0.1.0"
description = ""
authors = ["ChadiHelwe <chadi.helwe@gmail.com>"]
readme = "README.md"
packages = [{include = "bias_scope", from = "src"}]

[tool.poetry.dependencies]
python = ">=3.10"
numpy = ">=2.1.3"
torch = ">=2.5.1"


[tool.poetry.group.docs]
optional = true

[tool.poetry.group.docs.dependencies]
mkdocs = ">=1.6.1"


[tool.poetry.group.dev.dependencies]
isort = ">=5.13.2"
pytest = ">=8.3.3"
coverage = ">=7.6.4"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
